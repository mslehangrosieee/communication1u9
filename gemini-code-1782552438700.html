        :root {

        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {

            padding: 20px;
            color: var(--text-color);
            overflow-x: hidden;
        }

            z-index: 0;

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }

        header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .teacher-title {
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 15px;
            border-radius: 20px;
            display: inline-block;
            color: var(--primary);
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 2px solid var(--primary);
        }

        .alert-box {
            background: #FFF3CD;
            border-left: 6px solid #FFC107;
            padding: 15px;
            margin: 15px auto;
            border-radius: 12px;
            max-width: 750px;

            position: relative;
            z-index: 1;

        .alert-box h4 {

            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding-bottom: 100px;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #FFF;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-2px); }

        .question-header {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2D3436;
            line-height: 1.6;
        }

        .dialogue-text {

            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
            font-style: italic;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: #FFFFFF;
            border: 2px solid #E0E0E0;
            border-bottom: 5px solid #E0E0E0;
            border-radius: 16px;
            padding: 12px 18px;
            font-size: 1rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            outline: none;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.01) translateY(-2px);
            border-color: var(--primary);
            border-bottom-width: 5px;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        .option-btn:disabled { cursor: not-allowed; }

        .option-btn.correct {
            background-color: #E6F9F0 !important;
            border-color: var(--correct) !important;
            border-bottom-color: #00A854 !important;
            color: #006633 !important;
        }

        .option-btn.wrong {
            background-color: #FFEBEB !important;
            border-color: var(--wrong) !important;
            border-bottom-color: #D63031 !important;
            color: #A30000 !important;
        }

        .explanation-box {
            margin-top: 20px;
            background: #F8F9FA;
            border-radius: 16px;
            padding: 20px;
            border-left: 6px solid var(--accent);
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        .explanation-box h5 {
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .exp-section {
            margin-bottom: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .exp-title {
            font-weight: 700;
            color: #4b6584;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake { animation: shakeAnim 0.4s ease-in-out; }

        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .submit-area { text-align: center; margin-top: 40px; }

        .btn-submit-all {
            background: #FF7675;
            color: white;
            border: none;
            border-bottom: 6px solid #D63031;
            padding: 16px 45px;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: all 0.1s ease;
        }

        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .popup-overlay.active { opacity: 1; pointer-events: auto; }

        .popup-content {
            background: white;
            border-radius: 30px;
            padding: 35px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);

        .popup-score {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            margin: 15px 0;
        }

        .popup-comment {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #4b6584;
        }

        .popup-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-bottom: 5px solid #00A854;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180.00, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

                explanation: {

                    step2: "Câu (c) đưa ra chủ đề tổng quát (sự thân thiện). Câu (a) dùng 'Me too!' tiếp nối ngay lập tức để Brian chia sẻ cùng cảm xúc. Câu (b) là câu kết luận đánh giá giá trị cảm xúc cuối cùng.",
                    step3: "Trình tự liên kết chuẩn văn phong bản xứ là c -> a -> b. Chọn C.",
                    step4: "Nếu đưa b hoặc a lên đầu, cuộc trò chuyện không có câu chủ đề và đại từ 'It' ở câu b không có danh từ thay thế."
                }
            },
            {
                id: 1503, heading: "Exercise 15 - Câu 3 (Sắp xếp hội thoại)",
                isDialogue: false,
                question: `Sắp xếp các câu sau thành một đoạn hội thoại có nghĩa:<br>
                <strong>a.</strong> Brian: It's a nice change from looking at screens all day. Do you ever do any hand-crafts?<br>
                <strong>b.</strong> Ally: Not really, but you're making me want to try! Maybe I'll start with something simple like friendship bracelets.<br>
                <strong>c.</strong> Ally: Hey Brian, what are you working on? It looks interesting.<br>
                <strong>d.</strong> Ally: That's cool! I've always admired people who can create things with their hands.<br>
                <strong>e.</strong> Brian: Hi Ally! I'm trying to knit a scarf. I'm still learning, but it's quite relaxing.`,
                options: [
                    {key:"A", text:"c - e - d - a - b"},
                    {key:"B", text:"c - d - e - a - b"},
                    {key:"C", text:"e - c - d - a - b"},
                    {key:"D", text:"c - e - a - d - b"}
                ],
                correct: "A",
                explanation: {
                    step1: "Phân tích chuỗi hành động: (c) Ally bắt chuyện bằng câu hỏi Brian đang làm gì. (e) Brian đáp lời và bảo đang đan khăn len. (d) Ally khen ngợi tài làm đồ thủ công. (a) Brian giải thích lợi ích và hỏi ngược lại Ally có làm đồ thủ công không. (b) Ally trả lời câu hỏi của Brian.",
                    step2: "Cặp câu hỏi - trả lời 1: c mở đầu hỏi -> e đáp. Cặp phản hồi - hỏi ngược 2: d khen -> a giải thích và hỏi lại -> b trả lời chốt hội thoại.",
                    step3: "Ghép nối các mắt xích logic lại, ta có chuỗi chuẩn xác là c - e - d - a - b. Trùng khớp với đáp án A.",
                    step4: "Các phương án nhiễu khác đặt câu trả lời trước câu hỏi hoặc làm đứt mạch tương tác hỏi - đáp giữa hai nhân vật."
                }
            }
        ];

        // --- BỘ MÁY ĐIỀU HƯỚNG HIỂN THỊ ---
        const container = document.getElementById('quiz-container');
        let userAnswers = {};

        function renderQuiz() {
            container.innerHTML = "";
            questionsData.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${q.id}`;

                let headerHtml = `<div class="question-header"><strong>Câu ${index + 1}:</strong> [${q.heading}]</div>`;
                if (q.isDialogue) {
                    headerHtml += `<div class="dialogue-text">${q.dialogue}</div>`;
                } else {
                    headerHtml += `<div style="margin-bottom:15px; line-height:1.6;">${q.question}</div>`;
                }
                card.innerHTML = headerHtml;

                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = `<strong>${opt.key}.</strong> &nbsp;${opt.text}`;
                    btn.onclick = () => checkAnswer(btn, q.id, opt.key, q.correct);
                    optionsGrid.appendChild(btn);
                });
                
                card.appendChild(optionsGrid);

                const expBox = document.createElement('div');
                expBox.className = 'explanation-box';
                expBox.id = `exp-${q.id}`;
                expBox.innerHTML = `
                    <h5>💡 Giải Thích Sư Phạm Chi Tiết:</h5>
                    <div class="exp-section"><span class="exp-title">1. Ngữ cảnh & Dịch nghĩa câu:</span><br>${q.explanation.step1}</div>
                    <div class="exp-section"><span class="exp-title">2. Phân tích ngữ liệu liên kết:</span><br>${q.explanation.step2}</div>
                    <div class="exp-section"><span class="exp-title">3. Vì sao đáp án này đúng?</span><br>${q.explanation.step3}</div>
                    <div class="exp-section"><span class="exp-title">4. Vì sao các phương án khác sai?</span><br>${q.explanation.step4}</div>
                `;
                card.appendChild(expBox);
                container.appendChild(card);
            });
        }

        function checkAnswer(clickedBtn, qId, selectedKey, correctKey) {
            const card = document.getElementById(`card-${qId}`);
            const buttons = card.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (selectedKey === correctKey) {
                clickedBtn.classList.add('correct');
                playSound('correct');
                userAnswers[qId] = true;
            } else {
                clickedBtn.classList.add('wrong');
                buttons.forEach(btn => {
                    if (btn.innerHTML.includes(`<strong>${correctKey}.</strong>`)) {
                        btn.classList.add('correct');
                    }
                });
                card.classList.add('shake');
                playSound('wrong');
                userAnswers[qId] = false;
            }
            document.getElementById(`exp-${qId}`).style.display = 'block';
        }

        function submitTotalExam() {
            let correctCount = 0;
            const totalQuestions = questionsData.length;
            
            for (let key in userAnswers) {
                if (userAnswers[key] === true) correctCount++;
            }
            
            const percentage = (correctCount / totalQuestions) * 100;
            document.getElementById('score-display').innerText = `${correctCount}/${totalQuestions}`;

            let comment = "";
            if (percentage < 60) {
                comment = "Con cần chú ý hơn vào các từ nối liên kết câu bài giao tiếp nhé! Đọc kỹ giải thích nha.";
            } else if (percentage >= 60 && percentage < 90) {
                comment = "Làm tốt lắm con! Tư duy logic hội thoại rất nhạy bén, cố gắng sửa các câu sót nha.";
            } else {
                comment = "Tuyệt vời ông mặt trời! Đạt điểm tuyệt đối rồi, con học phần giao tiếp này rất vững vàng!";
            }

            document.getElementById('comment-display').innerText = `Lời khuyên từ cô Hằng: "${comment}"`;
            document.getElementById('result-popup').classList.add('active');
        }

        function closePopup() {
            document.getElementById('result-popup').classList.remove('active');
            userAnswers = {};
            renderQuiz();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        renderQuiz();
    </script>
</body>
